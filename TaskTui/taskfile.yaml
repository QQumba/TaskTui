version: "3"

vars:
  NUGET_OUT: C:/git/nuget
  PORT: 9222
  GLOBAL_A: "default-A"
  GLOBAL_B: "default-B"
  GLOBAL_C: "default-C"

tasks:
  pack:
    desc: Pack project (base task)
    dir: "{{.PROJECT_DIR}}"
    requires:
      vars: [PROJECT_DIR, VERSION]
    cmds:
      - dotnet pack --version-suffix={{.VERSION}} --output={{.NUGET_OUT}}

  pack-action-runner:
    desc: Pack with dev defaults
    requires:
      vars: [VERSION]
    cmds:
      - task: pack
        vars:
          PROJECT_DIR: C:/git/project-manager/ProjectManager
          
  run-chrome:
    requires: 
      vars: [PORT]
    cmds:
      - cmd /c start "" "C:\Program Files\Google\Chrome\Application\chrome.exe" --remote-debugging-port={{.PORT}} --user-data-dir=C:/tmp/chrome-debug-profile
        
  # --- 0 VARIABLE TASKS ---
  echo-1:
    desc: "Simple echo without variables 1"
    cmds:
      - echo Task 1 says hello

  echo-2:
    desc: "Simple echo without variables 2"
    cmds:
      - echo Task 2 says hello

  echo-3:
    desc: "Simple echo without variables 3"
    cmds:
      - echo Task 3 says hello

  echo-4:
    desc: "Simple echo without variables 4"
    cmds:
      - echo Task 4 says hello

  echo-5:
    desc: "Simple echo without variables 5"
    cmds:
      - echo Task 5 says hello
        
  # --- 1 VARIABLE TASKS ---
  echo-6:
    desc: "Echo with 1 required variable"
    requires:
      vars: [ NAME ]
    cmds:
      - echo Hello {{.NAME}} from task 6

  echo-7:
    desc: "Echo with default variable from root"
    requires:
      vars: [ GLOBAL_A ]
    cmds:
      - echo Task 7 using {{.GLOBAL_A}}

  echo-8:
    desc: "Optional variable with default"
    vars:
      VALUE: "default-8"
    cmds:
      - echo Task 8 value is {{.VALUE}}

  echo-9:
    desc: "Required custom variable"
    requires:
      vars: [ VALUE ]
    cmds:
      - echo Task 9 value is {{.VALUE}}

  echo-10:
    desc: "Single variable test"
    requires:
      vars: [ PORT ]
    cmds:
      - echo Task 10 running on port {{.PORT}}
    
  # --- 2 VARIABLE TASKS ---
  echo-11:
    desc: "Two required variables"
    requires:
      vars: [ A, B ]
    cmds:
      - echo Task 11 A={{.A}} B={{.B}}

  echo-12:
    desc: "Two vars, one from root"
    requires:
      vars: [ A, GLOBAL_A ]
    cmds:
      - echo Task 12 A={{.A}} GLOBAL_A={{.GLOBAL_A}}

  echo-13:
    desc: "Two optional defaults"
    vars:
      A: "a13"
      B: "b13"
    cmds:
      - echo Task 13 A={{.A}} B={{.B}}

  echo-14:
    desc: "Mixed required + default"
    requires:
      vars: [ A ]
    vars:
      B: "b14"
    cmds:
      - echo Task 14 A={{.A}} B={{.B}}

  echo-15:
    desc: "Two required variables again"
    requires:
      vars: [ USER, ENV ]
    cmds:
      - echo Task 15 USER={{.USER}} ENV={{.ENV}}
        
  # --- 3 VARIABLE TASKS ---
  echo-16:
    desc: "Three required variables"
    requires:
      vars: [ A, B, C ]
    cmds:
      - echo Task 16 A={{.A}} B={{.B}} C={{.C}}

  echo-17:
    desc: "Three vars, one global"
    requires:
      vars: [ A, B, GLOBAL_A ]
    cmds:
      - echo Task 17 A={{.A}} B={{.B}} GLOBAL_A={{.GLOBAL_A}}

  echo-18:
    desc: "Three optional defaults"
    vars:
      A: "a18"
      B: "b18"
      C: "c18"
    cmds:
      - echo Task 18 A={{.A}} B={{.B}} C={{.C}}

  echo-19:
    desc: "Two required, one default"
    requires:
      vars: [ A, B ]
    vars:
      C: "c19"
    cmds:
      - echo Task 19 A={{.A}} B={{.B}} C={{.C}}

  echo-20:
    desc: "Three required again"
    requires:
      vars: [ X, Y, Z ]
    cmds:
      - echo Task 20 X={{.X}} Y={{.Y}} Z={{.Z}}